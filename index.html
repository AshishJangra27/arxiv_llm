<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArxivLLM - Academic Research Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
                        serif: ['Georgia', '"Times New Roman"', 'Times', 'serif'],
                        mono: ['Consolas', '"Courier New"', 'monospace']
                    },
                    colors: {
                        arxiv: {
                            red: '#b31b1b', // Classic arXiv red
                            darkred: '#8a1515',
                            bg: '#ffffff',
                            sidebar: '#f9f9f9',
                            border: '#e5e5e5',
                            text: '#111111',
                            muted: '#555555',
                            link: '#0000ee'
                        }
                    }
                } 
            }
        }
    </script>
    
    <!-- React & ReactDOM (UMD globals) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Compiles JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        // Force Babel to use the "classic" runtime to avoid module import errors in standalone HTML
        Babel.registerPreset('react-classic', {
            presets: [[Babel.availablePresets.react, { runtime: 'classic' }]]
        });
    </script>

    <!-- PDF.js (Loads Native PDF Renderer) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        /* Academic Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cccccc; border-radius: 0px; }
        .dark ::-webkit-scrollbar-thumb { background: #444444; }
        
        /* Drag-to-pan Mindmap Styles */
        .mindmap-container { touch-action: none; user-select: none; }
        
        /* Typography overrides for academic feel */
        body { font-size: 15px; }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden bg-arxiv-bg dark:bg-[#121212] text-arxiv-text dark:text-[#e0e0e0] antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic,env">
        const { useState, useRef, useEffect, useCallback } = React;
        const { createRoot } = ReactDOM;

        const FileTextIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
        const UploadIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const TrashIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const SendIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
        const CheckCircleIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const BotIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="10" x="3" y="11" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>;
        const UserIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const LoaderIcon = ({ className = "animate-spin w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>;
        const KeyIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>;
        const MoonIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const SunIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const SparklesIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/></svg>;
        const ChevronLeftIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
        const ChevronRightIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const NetworkIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>;
        const SlidesIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="14" x="3" y="5" rx="1"/><path d="M12 5v14"/><path d="M3 12h18"/></svg>;
        const DownloadIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const ZoomInIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const ZoomOutIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const MaximizeIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>;
        const MinimizeIcon = ({ className = "w-4 h-4" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>;

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        const fetchWithRetry = async (url, options, retries = 5) => {
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData?.error?.message || `HTTP error ${response.status}`);
                    }
                    return await response.json();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await sleep(delay);
                    delay *= 2;
                }
            }
        };

        // Arxiv style Markdown Parser
        const SimpleMarkdown = ({ content }) => {
            const createMarkup = (text) => {
                let html = text
                    .replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold mt-5 mb-2 font-serif">$1</h3>')
                    .replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold mt-6 mb-3 font-serif border-b pb-1 dark:border-gray-700">$1</h2>')
                    .replace(/^# (.*$)/gim, '<h1 class="text-2xl font-bold mt-6 mb-4 font-serif text-arxiv-red">$1</h1>')
                    .replace(/\*\*(.*?)\*\*/gim, '<strong class="font-bold">$1</strong>')
                    .replace(/\*(.*?)\*/gim, '<em>$1</em>')
                    .replace(/`(.*?)`/gim, '<code class="bg-gray-100 dark:bg-gray-800 px-1.5 py-0.5 rounded-sm text-[13px] font-mono">$1</code>')
                    .replace(/\n\n/gim, '</p><p class="mb-4">')
                    .replace(/\n/gim, '<br/>');
                return { __html: `<p class="mb-4">${html}</p>` };
            };
            return <div dangerouslySetInnerHTML={createMarkup(content)} className="font-serif leading-relaxed" />;
        };

        // Mindmap Node Renderer
        const MindmapNode = ({ node }) => {
            if (!node || !node.name) return null;
            return (
                <div className="flex items-center">
                    <div className="relative group">
                        <div className="bg-white dark:bg-[#1e1e1e] border border-arxiv-red/50 dark:border-arxiv-red/80 px-4 py-2 rounded-sm shadow-sm hover:border-arxiv-red transition-all min-w-[120px] max-w-[220px] text-center cursor-help z-10 relative">
                            <p className="font-semibold text-sm text-arxiv-text dark:text-gray-100 font-serif leading-snug">{node.name}</p>
                        </div>
                        <div className="absolute z-50 left-1/2 -translate-x-1/2 bottom-full mb-2 w-56 bg-arxiv-text dark:bg-gray-200 text-white dark:text-arxiv-text text-xs p-3 rounded-sm opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-opacity duration-200 shadow-xl text-left pointer-events-none font-sans">
                            {node.description}
                            <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-arxiv-text dark:border-t-gray-200"></div>
                        </div>
                    </div>
                    {node.children && node.children.length > 0 && (
                        <div className="flex flex-col gap-4 pl-8 relative py-2">
                            {node.children.map((child, idx) => {
                                const isFirst = idx === 0;
                                const isLast = idx === node.children.length - 1;
                                const isOnly = node.children.length === 1;
                                return (
                                    <div key={idx} className="relative flex items-center">
                                        <div className="absolute -left-8 top-1/2 w-8 h-[1px] bg-gray-300 dark:bg-gray-700 z-0"></div>
                                        {!isOnly && (
                                            <div className={`absolute -left-8 w-[1px] bg-gray-300 dark:bg-gray-700 z-0
                                                ${isFirst ? 'top-1/2 h-1/2' : isLast ? 'bottom-1/2 h-1/2' : 'top-0 h-full'}
                                            `}></div>
                                        )}
                                        <MindmapNode node={child} />
                                    </div>
                                )
                            })}
                        </div>
                    )}
                </div>
            )
        };

        // Chat Citation Renderer
        const ChatMessageContent = ({ text, onReferenceClick }) => {
            const lines = text.split('\n');
            return (
                <div className="space-y-2 text-[14px] leading-relaxed">
                    {lines.map((line, i) => {
                        let isBullet = false;
                        let content = line;
                        if (line.trim().startsWith('* ') || line.trim().startsWith('- ')) {
                            isBullet = true;
                            content = line.trim().substring(2);
                        }
                        const parseInline = (str) => {
                            const elements = [];
                            let lastIndex = 0;
                            const inlineRegex = /(\*\*.*?\*\*|`.*?`|\[\[.*?\]\])/g;
                            let match; let keyCounter = 0;
                            while ((match = inlineRegex.exec(str)) !== null) {
                                if (match.index > lastIndex) elements.push(<span key={`t-${keyCounter++}`}>{str.substring(lastIndex, match.index)}</span>);
                                const matchedStr = match[0];
                                if (matchedStr.startsWith('**') && matchedStr.endsWith('**')) {
                                    elements.push(<strong key={`b-${keyCounter++}`} className="font-semibold">{matchedStr.slice(2, -2)}</strong>);
                                } else if (matchedStr.startsWith('`') && matchedStr.endsWith('`')) {
                                    elements.push(<code key={`c-${keyCounter++}`} className="bg-gray-100 dark:bg-gray-800 px-1 py-0.5 rounded-sm text-[12px] font-mono border border-gray-200 dark:border-gray-700">{matchedStr.slice(1, -1)}</code>);
                                } else if (matchedStr.startsWith('[[') && matchedStr.endsWith(']]')) {
                                    const citeContent = matchedStr.slice(2, -2);
                                    elements.push(
                                        <button 
                                            key={`cite-${keyCounter++}`} 
                                            onClick={() => onReferenceClick(citeContent)}
                                            className="inline-flex items-center gap-1 text-arxiv-link dark:text-[#6699ff] hover:underline px-1 py-0 text-xs mx-0.5 transition-colors cursor-pointer align-baseline font-mono"
                                            title="View Reference"
                                        >
                                            [{citeContent}]
                                        </button>
                                    );
                                }
                                lastIndex = inlineRegex.lastIndex;
                            }
                            if (lastIndex < str.length) elements.push(<span key={`t-${keyCounter++}`}>{str.substring(lastIndex)}</span>);
                            return elements;
                        };

                        if (isBullet) return <li key={i} className="ml-4 list-disc marker:text-arxiv-red">{parseInline(content)}</li>;
                        if (content.startsWith('### ')) return <h3 key={i} className="font-bold mt-2">{parseInline(content.slice(4))}</h3>;
                        if (content.startsWith('## ')) return <h2 key={i} className="font-bold mt-3 border-b border-gray-200 dark:border-gray-800 pb-1">{parseInline(content.slice(3))}</h2>;
                        if (content.startsWith('# ')) return <h1 key={i} className="font-bold mt-3 text-arxiv-red">{parseInline(content.slice(2))}</h1>;
                        return content.trim() ? <p key={i}>{parseInline(content)}</p> : <div key={i} className="h-1" />;
                    })}
                </div>
            );
        };

        function App() {
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [docs, setDocs] = useState([]);
            const [viewingDocId, setViewingDocId] = useState(null);
            
            const [viewMode, setViewMode] = useState('document'); // document | mindmap | presentation
            const [isFullScreen, setIsFullScreen] = useState(false);
            
            const [messages, setMessages] = useState([
                { role: 'assistant', text: 'Welcome to **ArxivLLM**. Upload research papers (PDF/MD/TXT) to begin analysis. I can extract references, summarize methodologies, and generate knowledge graphs or presentations.' }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);

            const [apiKeyInput, setApiKeyInput] = useState('');
            const [activeApiKey, setActiveApiKey] = useState('');
            const [isApiConnected, setIsApiConnected] = useState(false);
            const [isValidatingApi, setIsValidatingApi] = useState(false);
            const [showApiInput, setShowApiInput] = useState(true);
            const [apiError, setApiError] = useState('');

            // PDF
            const [pdfInstance, setPdfInstance] = useState(null);
            const [pdfPageNum, setPdfPageNum] = useState(1);
            const [pdfNumPages, setPdfNumPages] = useState(0);
            const [pdfLoading, setPdfLoading] = useState(false);
            const [pdfError, setPdfError] = useState(null);
            const [highlightData, setHighlightData] = useState(null);
            const [flashViewer, setFlashViewer] = useState(false);

            // Mindmap
            const [mindmapData, setMindmapData] = useState(null);
            const [isGeneratingMindmap, setIsGeneratingMindmap] = useState(false);
            const [mindmapError, setMindmapError] = useState(null);
            const [mindmapScale, setMindmapScale] = useState(1);
            const [mindmapPan, setMindmapPan] = useState({ x: 0, y: 0 });

            // PPT
            const [presentationData, setPresentationData] = useState(null);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [pptScale, setPptScale] = useState(1);
            const [isGeneratingPPT, setIsGeneratingPPT] = useState(false);
            const [pptError, setPptError] = useState(null);

            const fileInputRef = useRef(null);
            const messagesEndRef = useRef(null);
            const canvasRef = useRef(null);
            
            // Drag State for Mindmap
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading]);
            
            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            useEffect(() => {
                setMindmapData(null); setMindmapError(null); setMindmapScale(1); setMindmapPan({x:0, y:0});
                setPresentationData(null); setPptError(null); setCurrentSlide(0); setPptScale(1);
            }, [docs.map(d => d.isSelected ? d.id : '').join(',')]);

            // PDF Loading
            const viewingDoc = docs.find(d => d.id === viewingDocId);
            useEffect(() => {
                if (!window.pdfjsLib || !viewingDoc || viewingDoc.type !== 'pdf') return;
                let isActive = true;
                setPdfLoading(true); setPdfError(null); setPdfInstance(null);
                
                const loadingTask = window.pdfjsLib.getDocument({ data: viewingDoc.data });
                loadingTask.promise.then((pdf) => {
                    if (!isActive) return;
                    setPdfInstance(pdf); setPdfNumPages(pdf.numPages); setPdfPageNum(1); setPdfLoading(false);
                }).catch(err => {
                    if (!isActive) return;
                    console.error("PDF Load Error", err);
                    setPdfError("Failed to render PDF visual preview. However, the AI can still read it.");
                    setPdfLoading(false);
                });
                return () => { isActive = false; loadingTask.destroy(); };
            }, [viewingDoc]);

            // PDF Canvas Rendering
            useEffect(() => {
                if (!pdfInstance || !canvasRef.current || viewMode !== 'document') return;
                let renderTask = null; let isActive = true;
                const renderPage = async () => {
                    try {
                        const page = await pdfInstance.getPage(pdfPageNum);
                        if (!isActive) return;
                        
                        const containerWidth = Math.max((canvasRef.current.parentElement.clientWidth || 800) - 64, 400);
                        const unscaledViewport = page.getViewport({ scale: 1 });
                        const scale = Math.min(1.5, containerWidth / unscaledViewport.width);
                        
                        const viewport = page.getViewport({ scale });
                        const canvas = canvasRef.current;
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        
                        renderTask = page.render({ canvasContext: context, viewport: viewport });
                        await renderTask.promise;
                    } catch (e) {
                        if (e.name !== 'RenderingCancelledException') console.error('Render error:', e);
                    }
                };
                renderPage();

            const validateApiKey = async () => {

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);

                let newDocs = [...docs]; let errorMsg = null;
                for (let file of files) {
                    if (newDocs.length >= 5) { errorMsg = "Max 5 documents allowed."; break; }
                    if (file.size > 10 * 1024 * 1024) { errorMsg = `File ${file.name} too large (max 10MB).`; continue; }
                    
                    const isPdf = file.type === 'application/pdf';
                    const reader = new FileReader();
                    const fileProcessed = new Promise((resolve) => {
                        if (isPdf) {
                            reader.onload = (event) => {
                                const arrayBuffer = event.target.result;
                                let binary = ''; const bytes = new Uint8Array(arrayBuffer);
                                for (let i = 0; i < bytes.byteLength; i += 8192) binary += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
                                resolve({ id: generateId(), name: file.name, type: 'pdf', data: new Uint8Array(arrayBuffer), base64: window.btoa(binary), isSelected: true });
                            };
                            reader.readAsArrayBuffer(file);
                        } else {
                            reader.onload = (event) => resolve({ id: generateId(), name: file.name, type: file.name.endsWith('.md') ? 'markdown' : 'text', content: event.target.result, isSelected: true });
                            reader.readAsText(file);
                        }
                    });
                    newDocs.push(await fileProcessed);
                }
                setDocs(newDocs);
                if (!viewingDocId && newDocs.length > 0) setViewingDocId(newDocs[newDocs.length - 1].id);

            const toggleDocSelection = (id) => {
                setDocs(docs.map(doc => {

            const deleteDoc = (id) => {

            const handleReferenceClick = (citeText) => {

                const pageMatch = citeText.match(/Page\s+(\d+)/i);
                const targetDoc = docs.find(d => d.name.toLowerCase() === docName.toLowerCase());
                
                if (targetDoc) {

                    selectedDocs.forEach(doc => {
                        if (doc.type === 'pdf') {
                            parts.push({ text: `\n[Document Name: ${doc.name} (PDF format attached)]\n` });
                            parts.push({ inlineData: { mimeType: 'application/pdf', data: doc.base64 } });
                        } else {
                            parts.push({ text: `\n[Document Name: ${doc.name}]\n${doc.content}\n` });

                    parts.push({ text: "\n--- END DOCUMENTS ---\n\n" });

                                        {viewMode === 'mindmap' && mindmapData && (
                                            <div className="flex items-center gap-3 border-r border-arxiv-border dark:border-gray-700 pr-3">
                                                <div className="flex items-center text-xs bg-white dark:bg-[#121212] border border-arxiv-border dark:border-gray-700">
                                                    <button onClick={() => setMindmapScale(s => Math.max(0.3, s - 0.1))} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 text-arxiv-muted dark:text-gray-400 border-r border-arxiv-border dark:border-gray-700"><ZoomOutIcon /></button>
                                                    <span className="px-2 w-10 text-center">{Math.round(mindmapScale * 100)}%</span>
                                                    <button onClick={() => setMindmapScale(s => Math.min(3, s + 0.1))} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 text-arxiv-muted dark:text-gray-400 border-l border-arxiv-border dark:border-gray-700"><ZoomInIcon /></button>
                                                </div>
                                                <IOButton onClick={generateMindmap} variant="outline" className="py-1 px-2 text-xs">Regenerate</IOButton>
                                            </div>
                                        )}

                                        {viewMode === 'presentation' && presentationData && (
                                            <div className="flex items-center gap-3 border-r border-arxiv-border dark:border-gray-700 pr-3">
                                                <div className="flex items-center text-xs bg-white dark:bg-[#121212] border border-arxiv-border dark:border-gray-700">
                                                    <button onClick={() => setPptScale(s => Math.max(0.3, s - 0.1))} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 text-arxiv-muted dark:text-gray-400 border-r border-arxiv-border dark:border-gray-700"><ZoomOutIcon /></button>
                                                    <span className="px-2 w-10 text-center">{Math.round(pptScale * 100)}%</span>
                                                    <button onClick={() => setPptScale(s => Math.min(2, s + 0.1))} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 text-arxiv-muted dark:text-gray-400 border-l border-arxiv-border dark:border-gray-700"><ZoomInIcon /></button>
                                                </div>
                                                <IOButton onClick={downloadHTMLPresentation} variant="outline" className="py-1 px-2 text-xs"><DownloadIcon /> Export HTML</IOButton>
                                            </div>
                                        )}

                                        <button onClick={() => setIsFullScreen(!isFullScreen)} className="text-arxiv-muted hover:text-arxiv-text dark:text-gray-400 dark:hover:text-white transition-colors" title={isFullScreen ? "Exit Fullscreen" : "Fullscreen"}>
                                            {isFullScreen ? <MinimizeIcon /> : <MaximizeIcon />}
                                        </button>
                                    </div>
                                </div>
                                
                                {viewMode === 'document' && viewingDoc && (
                                    <div className="px-4 py-1.5 flex items-center gap-2 overflow-x-auto bg-arxiv-sidebar dark:bg-[#121212] border-t border-arxiv-border dark:border-gray-800">
                                        <span className="text-[10px] text-arxiv-muted dark:text-gray-500 uppercase tracking-wider font-bold mr-2">Quick Actions</span>
                                        <button onClick={() => executeQuickAction('summarize')} className="text-[11px] text-arxiv-link dark:text-[#6699ff] hover:underline font-mono">Abstract_Summary</button>
                                        <span className="text-gray-300 dark:text-gray-700">|</span>
                                        <button onClick={() => executeQuickAction('entities')} className="text-[11px] text-arxiv-link dark:text-[#6699ff] hover:underline font-mono">Extract_Methodology</button>
                                        <span className="text-gray-300 dark:text-gray-700">|</span>
                                        <button onClick={() => executeQuickAction('actionItems')} className="text-[11px] text-arxiv-link dark:text-[#6699ff] hover:underline font-mono">Future_Works</button>
                                    </div>
                                )}
                            </div>

                            {/* View Content Areas */}
                            {viewMode === 'document' && (
                                <div className="flex-1 overflow-auto bg-arxiv-sidebar dark:bg-[#121212] p-6 w-full relative" onMouseUp={handleMouseUp}>
                                    {!viewingDoc ? (
                                        <div className="h-full flex flex-col items-center justify-center text-arxiv-muted dark:text-gray-600 gap-3 font-serif">
                                            <FileTextIcon className="w-8 h-8 opacity-50" />
                                            <p>Select a paper from the sidebar.</p>
                                        </div>
                                    ) : viewingDoc.type === 'pdf' ? (
                                        <div className="max-w-5xl mx-auto flex flex-col items-center w-full shadow-[0_0_15px_rgba(0,0,0,0.1)]">
                                            {pdfLoading ? (
                                                <div className="flex flex-col items-center gap-3 mt-32 text-arxiv-muted dark:text-gray-400">
                                                    <LoaderIcon />
                                                    <p className="font-serif">Rendering PDF...</p>
                                                </div>
                                            ) : pdfError ? (
                                                <div className="flex flex-col items-center gap-2 mt-32 text-arxiv-red border border-arxiv-red bg-red-50 dark:bg-red-900/20 px-6 py-4">
                                                    <p className="font-serif font-bold">{pdfError}</p>
                                                </div>
                                            ) : (
                                                <canvas ref={canvasRef} className="max-w-full bg-white shadow-sm border border-gray-300" />
                                            )}
                                        </div>
                                    ) : (
                                        <div className="max-w-4xl mx-auto bg-white dark:bg-[#1a1a1a] border border-arxiv-border dark:border-gray-800 p-12 min-h-full shadow-sm text-arxiv-text dark:text-gray-200 selection:bg-blue-200 dark:selection:bg-blue-900/50">
                                            {viewingDoc.type === 'markdown' ? <SimpleMarkdown content={viewingDoc.content} /> : <pre className="whitespace-pre-wrap font-mono text-[13px] leading-relaxed">{viewingDoc.content}</pre>}
                                        </div>
                                    )}
                                </div>
                            )}

                            {viewMode === 'mindmap' && (
                                <div className="flex-1 bg-arxiv-sidebar dark:bg-[#121212] w-full flex flex-col relative overflow-hidden border-t border-transparent shadow-inner">
                                    {!mindmapData && !isGeneratingMindmap && (
                                        <div className="h-full flex flex-col items-center justify-center gap-5 max-w-sm mx-auto text-center font-serif">
                                            <NetworkIcon className="w-10 h-10 text-arxiv-muted dark:text-gray-600" />
                                            <div>
                                                <h3 className="text-xl text-arxiv-text dark:text-white mb-1 border-b border-arxiv-border dark:border-gray-700 pb-2">Knowledge Graph</h3>
                                                <p className="text-sm text-arxiv-muted dark:text-gray-400 mt-2">Generate a conceptual topology from the active papers.</p>
                                            </div>
                                            <IOButton onClick={generateMindmap} variant="primary" className="mt-2 font-sans px-8 py-2">
                                                Compile Graph
                                            </IOButton>
                                            {mindmapError && <p className="text-xs font-bold text-arxiv-red mt-2">{mindmapError}</p>}
                                        </div>
                                    )}
                                    {isGeneratingMindmap && (
                                        <div className="h-full flex flex-col items-center justify-center gap-3 text-arxiv-muted dark:text-gray-400 font-mono text-sm">
                                            <LoaderIcon />
                                            <p className="animate-pulse">Compiling entity relations...</p>
                                        </div>
                                    )}
                                    {mindmapData && !isGeneratingMindmap && (
                                        <div 
                                            className={`w-full h-full overflow-hidden mindmap-container ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                                            onMouseDown={onMmMouseDown} onMouseMove={onMmMouseMove} onMouseUp={onMmMouseUp} onMouseLeave={onMmMouseUp}
                                        >
                                            <div 
                                                className="w-full h-full min-w-max min-h-max flex items-center justify-center p-24 transition-transform duration-75"
                                                style={{ transform: `scale(${mindmapScale}) translate(${mindmapPan.x}px, ${mindmapPan.y}px)`, transformOrigin: 'center' }}
                                            >
                                                <MindmapNode node={mindmapData} />
                                            </div>
                                            <div className="absolute bottom-4 left-4 text-[10px] text-arxiv-muted dark:text-gray-500 font-mono">Drag to pan view</div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {viewMode === 'presentation' && (
                                <div className="flex-1 bg-gray-200/50 dark:bg-[#121212] w-full flex flex-col relative overflow-hidden">
                                    {!presentationData && !isGeneratingPPT && (
                                        <div className="h-full flex flex-col items-center justify-center gap-5 max-w-sm mx-auto text-center font-serif">
                                            <SlidesIcon className="w-10 h-10 text-arxiv-muted dark:text-gray-600" />
                                            <div>
                                                <h3 className="text-xl text-arxiv-text dark:text-white mb-1 border-b border-arxiv-border dark:border-gray-700 pb-2">Beamer Presentation</h3>
                                                <p className="text-sm text-arxiv-muted dark:text-gray-400 mt-2">Generate a structured academic slide deck from context.</p>
                                            </div>
                                            <IOButton onClick={generatePPT} variant="primary" className="mt-2 font-sans px-8 py-2">
                                                Compile Deck
                                            </IOButton>
                                            {pptError && <p className="text-xs font-bold text-arxiv-red mt-2">{pptError}</p>}
                                        </div>
                                    )}
                                    {isGeneratingPPT && (
                                        <div className="h-full flex flex-col items-center justify-center gap-3 text-arxiv-muted dark:text-gray-400 font-mono text-sm">
                                            <LoaderIcon />
                                            <p className="animate-pulse">Formatting slides...</p>
                                        </div>
                                    )}
                                    {presentationData && !isGeneratingPPT && (
                                        <div className="w-full h-full flex flex-col items-center justify-center relative bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PHJlY3Qgd2lkdGg9IjIwIiBoZWlnaHQ9IjIwIiBmaWxsPSJub25lIi8+PGNpcmNsZSBjeD0iMTAiIGN5PSIxMCIgcj0iMSIgZmlsbD0icmdiYSgwLDAsMCwwLjA1KSIvPjwvc3ZnPg==')] dark:bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PHJlY3Qgd2lkdGg9IjIwIiBoZWlnaHQ9IjIwIiBmaWxsPSJub25lIi8+PGNpcmNsZSBjeD0iMTAiIGN5PSIxMCIgcj0iMSIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjA1KSIvPjwvc3ZnPg==')]">
                                            
                                            {/* Fixed Scale Slide Canvas Container */}
                                            <div className="flex-1 w-full flex items-center justify-center p-4 overflow-hidden relative">
                                                <div 
                                                    className="w-[900px] h-[506px] shrink-0 bg-white border border-gray-300 shadow-[0_10px_30px_rgba(0,0,0,0.15)] flex flex-col transition-transform duration-200 origin-center overflow-hidden relative"
                                                    style={{ transform: `scale(${pptScale})` }}
                                                >
                                                    {/* Beamer-style Academic Header */}
                                                    <div className="bg-arxiv-red text-white px-8 py-5 shrink-0 flex items-center justify-between border-b-4 border-arxiv-darkred">
                                                        <h2 className="text-3xl font-serif tracking-wide">{presentationData[currentSlide]?.title}</h2>
                                                    </div>

                                                    {/* Fixed Scroll-free Body */}
                                                    <div className="flex-1 flex flex-col p-10 bg-[#fafafa]">
                                                        <ul className="space-y-5 flex-1 list-none p-0 m-0">
                                                            {presentationData[currentSlide]?.content.map((pt, i) => (
                                                                <li key={i} className="text-[22px] font-serif text-[#222] flex items-start leading-snug">
                                                                    <span className="text-arxiv-red mr-4 text-xl">▶</span> 
                                                                    <span>{pt}</span>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                        
                                                        {/* Footer bar */}
                                                        <div className="mt-4 pt-4 border-t border-gray-300 flex justify-between text-sm font-sans text-gray-500 shrink-0">
                                                            <span>ArxivLLM Auto-Generated</span>
                                                            <span>{currentSlide + 1} / {presentationData.length}</span>
                                                        </div>
                                                    </div>

                                                    {/* Optional Speaker Notes Overlay (only shown if explicit space allows or viewed outside) */}
                                                    <div className="absolute bottom-2 left-2 max-w-[50%] bg-yellow-50 border border-yellow-200 p-2 text-[11px] text-gray-700 shadow-sm opacity-20 hover:opacity-100 transition-opacity z-50">
                                                        <b>Notes:</b> {presentationData[currentSlide]?.speakerNotes}
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {/* Carousel Controls Container */}
                                            <div className="h-16 flex items-center justify-center gap-4 shrink-0 bg-white dark:bg-[#1a1a1a] w-full border-t border-arxiv-border dark:border-gray-800 z-10 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
                                                <IOButton onClick={() => setCurrentSlide(s => s - 1)} disabled={currentSlide === 0} variant="outline" className="px-6 rounded-none">
                                                    <ChevronLeftIcon /> Previous Slide
                                                </IOButton>
                                                <span className="text-sm font-mono text-arxiv-muted dark:text-gray-400 w-16 text-center">{currentSlide + 1} / {presentationData.length}</span>
                                                <IOButton onClick={() => setCurrentSlide(s => s + 1)} disabled={currentSlide === presentationData.length - 1} variant="outline" className="px-6 rounded-none">
                                                    Next Slide <ChevronRightIcon />
                                                </IOButton>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </section>

                        {/* Right Chat Agent Pane */}
                        <aside className={`w-[400px] bg-arxiv-bg dark:bg-[#1a1a1a] flex flex-col shrink-0 overflow-hidden z-10 transition-all ${isFullScreen ? 'hidden' : 'flex'}`}>
                            <div className="h-12 border-b border-arxiv-border dark:border-gray-800 flex items-center justify-between px-5 shrink-0 bg-gray-50 dark:bg-[#1f1f1f]">
                                <h2 className="text-sm font-semibold text-arxiv-text dark:text-white flex items-center gap-2 font-serif tracking-wide">
                                    <BotIcon /> LLM Terminal
                                </h2>
                                <span className="text-[10px] font-mono text-arxiv-muted dark:text-gray-500 border border-arxiv-border dark:border-gray-700 px-2 py-0.5 bg-white dark:bg-[#121212]">
                                    {docs.filter(d => d.isSelected).length} Papers Active
                                </span>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 space-y-5 bg-white dark:bg-[#121212]">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`flex gap-3 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                        <div className={`w-7 h-7 flex items-center justify-center shrink-0 border ${msg.role === 'user' ? 'bg-arxiv-text dark:bg-gray-200 text-white dark:text-arxiv-text border-transparent' : 'bg-arxiv-sidebar dark:bg-[#1a1a1a] text-arxiv-red border-arxiv-border dark:border-gray-700'}`}>
                                            {msg.role === 'user' ? <UserIcon /> : <BotIcon />}
                                        </div>
                                        <div className={`flex flex-col max-w-[85%] ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                            <div className={`px-4 py-2.5 shadow-sm border ${msg.role === 'user' ? 'bg-arxiv-text dark:bg-gray-200 text-white dark:text-arxiv-text border-transparent text-[14px]' : 'bg-white dark:bg-[#1a1a1a] border-arxiv-border dark:border-gray-800 text-arxiv-text dark:text-gray-200 w-full'}`}>
                                                {msg.role === 'user' ? (
                                                    <div className="whitespace-pre-wrap leading-relaxed">{msg.text}</div>
                                                ) : (
                                                    <ChatMessageContent text={msg.text} onReferenceClick={handleReferenceClick} />
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {loading && (
                                    <div className="flex gap-3">
                                        <div className="w-7 h-7 bg-arxiv-sidebar dark:bg-[#1a1a1a] border border-arxiv-border dark:border-gray-700 text-arxiv-red flex items-center justify-center shrink-0">
                                            <LoaderIcon />
                                        </div>
                                        <div className="bg-white dark:bg-[#1a1a1a] border border-arxiv-border dark:border-gray-800 px-4 py-2.5 text-xs text-arxiv-muted dark:text-gray-500 font-mono shadow-sm">
                                            Processing query...
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>

                            <div className="p-3 bg-gray-50 dark:bg-[#1f1f1f] border-t border-arxiv-border dark:border-gray-800">
                                <form onSubmit={handleFormSubmit} className="relative flex items-end gap-2 bg-white dark:bg-[#121212] border border-arxiv-border dark:border-gray-700 focus-within:border-arxiv-red dark:focus-within:border-arxiv-red transition-all p-1">
                                    <textarea
                                        value={input} onChange={(e) => setInput(e.target.value)}
                                        onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                                        placeholder={!isApiConnected ? "Requires API Key..." : "Query papers..."}
                                        disabled={!isApiConnected}
                                        className="w-full bg-transparent border-none focus:ring-0 resize-none max-h-32 min-h-[38px] py-2 px-3 text-[14px] text-arxiv-text dark:text-white placeholder-arxiv-muted dark:placeholder-gray-600 outline-none disabled:opacity-50"
                                        rows="1"
                                    />
                                    <button type="submit" disabled={loading || !input.trim() || !isApiConnected} className="w-10 h-10 flex items-center justify-center bg-arxiv-red text-white hover:bg-arxiv-darkred disabled:bg-gray-300 dark:disabled:bg-gray-800 transition-colors shrink-0 rounded-sm">
                                        <SendIcon />
                                    </button>
                                </form>
                                <p className="text-[10px] text-center text-arxiv-muted dark:text-gray-500 mt-2 font-mono">
                                    ArxivLLM may hallucinate. Verify references.
                                </p>
                            </div>
                        </aside>
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
